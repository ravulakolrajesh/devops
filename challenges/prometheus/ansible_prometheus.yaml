Crucial Tip for Docker Networking
In your prometheus.yml, you might have noticed I used node-exporter:9100 instead of localhost:9100.

Why? Inside a Docker network, each container is like its own separate machine. localhost inside the Prometheus container refers only to itself. To "see" the other container, it must use the service name defined in your docker-compose.yml.
Isolation: If you want to delete Prometheus, you just delete the container. No leftover files in /etc or /usr/local/bin.
Networking: Docker creates a private network. Prometheus can find Node Exporter just by using the name node-exporter:9100.
No Systemd: Docker manages the "restart on crash" logic itself. 
